packages:
  - "apps/*"
  - "packages/*"

# pnpm 11 bloquea por defecto los scripts de postinstall de dependencias.
# esbuild (usado por Vite) trae su binario nativo vía optionalDependencies y
# requiere ese postinstall para descargar el binario correcto de la plataforma.
# Lo aprobamos explícitamente para que `pnpm install` no quede bloqueado
# esperando aprobación manual.
allowBuilds:
  esbuild: true

verifyDepsBeforeRun: false
